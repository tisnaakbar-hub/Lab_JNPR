name: lab-jnpr
mgmt:
  bridge: br103
  ipv4-subnet: 172.16.103.0/24
topology:
  nodes:
    R1:
      kind: juniper_vjunosrouter
      image: vrnetlab/juniper_vjunos-router:25.2R1.7
      mgmt-ipv4: 172.16.103.81

    R2:
      kind: juniper_vjunosrouter
      image: vrnetlab/juniper_vjunos-router:25.2R1.7
      mgmt-ipv4: 172.16.103.82

    R3:
      kind: juniper_vjunosrouter
      image: vrnetlab/juniper_vjunos-router:25.2R1.7
      mgmt-ipv4: 172.16.103.83

    R4:
      kind: juniper_vjunosrouter
      image: vrnetlab/juniper_vjunos-router:25.2R1.7
      mgmt-ipv4: 172.16.103.84

  links:
  # Interlink Nodes #
    - endpoints: [ "R1:eth1", "R2:eth1" ]
    - endpoints: [ "R1:eth2", "R3:eth1" ]
    - endpoints: [ "R1:eth3", "R4:eth1" ]
    - endpoints: [ "R2:eth2", "R3:eth2" ]
    - endpoints: [ "R2:eth3", "R4:eth2" ]
    - endpoints: [ "R3:eth3", "R4:eth3" ]

